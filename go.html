<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="dapp-browser" content="trust" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0b1020;
      color: #f4f7fb;
    }

    .shell {
      width: min(92vw, 28rem);
      padding: 2rem 1.5rem;
      border-radius: 1rem;
      background: rgba(17, 24, 39, 0.92);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
      text-align: center;
    }

    h1 {
      margin: 0 0 0.75rem;
      font-size: 1.5rem;
    }

    p {
      margin: 0;
      line-height: 1.5;
      color: #cbd5e1;
    }

    #fallback {
      margin-top: 1.25rem;
    }

    .btn {
      display: inline-block;
      margin-top: 0.75rem;
      padding: 0.9rem 1.15rem;
      border-radius: 0.85rem;
      background: #f0b90b;
      color: #111827;
      font-weight: 700;
      text-decoration: none;
    }

    .hint {
      margin-top: 0.85rem;
      font-size: 0.95rem;
      color: #94a3b8;
    }
  </style>
  <script>
    (function () {
      var dappUrl = window.location.origin + '/';
      var encoded = encodeURIComponent(dappUrl);
      var universalLink = 'https://link.trustwallet.com/open_url?coin_id=20000714&url=' + encoded;
      var deepLink = 'trust://open_url?coin_id=20000714&url=' + encoded;
      var androidIntentLink = 'intent://link.trustwallet.com/open_url?coin_id=20000714&url=' + encoded + '#Intent;scheme=https;package=com.wallet.crypto.trustapp;S.browser_fallback_url=' + encodeURIComponent(universalLink) + ';end';
      var ua = navigator.userAgent || '';
      var isAndroid = /android/i.test(ua);
      var isIOS = /iPad|iPhone|iPod/i.test(ua);

      if (window.ethereum && (window.ethereum.isTrust || window.ethereum.isTrustWallet)) {
        window.location.replace('/');
        return;
      }

      document.addEventListener('DOMContentLoaded', function () {
        var button = document.getElementById('open-btn');
        var altButton = document.getElementById('alt-open-btn');
        var status = document.getElementById('status');
        var hint = document.getElementById('hint');
        var primaryHref = isAndroid ? androidIntentLink : universalLink;
        var altHref = isAndroid ? universalLink : deepLink;
        var fallbackTimer = null;

        if (status) {
          status.textContent = isAndroid
            ? 'Opening Trust Wallet on Android...'
            : isIOS
              ? 'Opening Trust Wallet on iPhone...'
              : 'Open this page on a phone with Trust Wallet installed.';
        }

        if (button) {
          button.href = primaryHref;
        }

        if (altButton) {
          altButton.href = altHref;
        }

        if (hint && !isAndroid && !isIOS) {
          hint.textContent = 'Desktop browsers cannot hand off directly. Scan this QR on a phone instead.';
        }

        if (isAndroid || isIOS) {
          fallbackTimer = setTimeout(function () {
            if (status) {
              status.textContent = 'If Trust Wallet did not come to the front, use the button below.';
            }
          }, 1400);

          window.addEventListener('pagehide', function () {
            if (fallbackTimer) clearTimeout(fallbackTimer);
          }, { once: true });

          window.location.replace(primaryHref);
        }
      });
    })();
  </script>
</head>
<body>
  <main class="shell">
    <h1>Open in Trust Wallet</h1>
    <p id="status">Preparing handoff...</p>
    <div id="fallback">
      <a id="open-btn" class="btn" href="#">Open in Trust Wallet</a>
      <p id="hint" class="hint">If the first button does not work, use the alternate handoff below.</p>
      <a id="alt-open-btn" class="btn" href="#">Try Alternate Link</a>
    </div>
  </main>
</body>
</html>
